name: cron-ingest

on:
  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      source:
        description: source filter (all, or any value accepted by high_signal_ingest.pipeline --source)
        type: string
        default: all
      days:
        description: lookback days
        type: string
        default: "1"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: python/ingest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: uv sync
      - name: ingest
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          API_BASE: ${{ secrets.API_BASE }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL || 'https://api.deepseek.com' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL || 'deepseek-v4-flash' }}
          AI_PROJECT_ID: high-signal
          SEC_USER_AGENT: "high-signal sarthakagrawal927@gmail.com"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          REGULATIONS_GOV_API_KEY: ${{ secrets.REGULATIONS_GOV_API_KEY }}
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          PODCAST_INDEX_KEY: ${{ secrets.PODCAST_INDEX_KEY }}
          PODCAST_INDEX_SECRET: ${{ secrets.PODCAST_INDEX_SECRET }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          EDGAR_TICKER_LIMIT: "25"
          SIGNAL_CLUSTER_LIMIT: "40"
        run: |
          uv run python -m high_signal_ingest.pipeline \
            --source "${{ inputs.source || 'all' }}" \
            --days "${{ inputs.days || '1' }}"
