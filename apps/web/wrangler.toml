name = "high-signal-web"
account_id = "7d048325699a5acddb44d3be31cf6ba9"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Custom domains — created/reconciled on deploy (idempotent if already added via dashboard).
# www is redirected to the apex by next.config.ts redirects().
routes = [
  { pattern = "highsignal.app", custom_domain = true },
  { pattern = "www.highsignal.app", custom_domain = true },
]

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

[vars]
NODE_ENV = "production"
NEXT_PUBLIC_SAASMAKER_API_KEY = "pk_3eb4816ef2179c25f364315aa1c3148a88e8004bfa5e5235"
NEXT_PUBLIC_API_BASE = "https://high-signal-api.sarthakagrawal927.workers.dev"
NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_test_ZmFpci1ob3JuZXQtMjcuY2xlcmsuYWNjb3VudHMuZGV2JA"
# Auth is Clerk. Set in the Cloudflare dashboard (Secrets, not vars):
#   CLERK_SECRET_KEY            (sk_…)
#   ADMIN_ALLOWED_EMAILS        comma-separated allow-list, gates /track-record admin view
#   ADMIN_TOKEN                 wrangler secret put ADMIN_TOKEN (used by Modal scorer + sync)
#   LAB_API_URL                 optional, points the /lab page at a Lab Postgres FastAPI
#   HIGH_SIGNAL_AI_API_KEY      optional, unlocks LLM calls in Mentions / Agent Eval / community digests

[[services]]
binding = "API"
service = "high-signal-api"

[[services]]
binding = "ANNOTATION"
service = "high-signal-annotation"
